appId: org.local.studio.desktop
productName: Local Studio
asar: true

afterPack: ./scripts/electron-builder-after-pack.mjs

asarUnpack:
  - "node_modules/@lydell/**/*.node"
  - "node_modules/@lydell/**/spawn-helper"

files:
  - desktop/dist/**
  - package.json
  - node_modules/@lydell/node-pty/**
  - node_modules/@lydell/node-pty-${platform}-${arch}/**

extraResources:
  - from: ../services/agent-runtime/dist/standalone.mjs
    to: app/agent-runtime/standalone.mjs
  - from: ../services/agent-runtime/dist/node_modules/playwright-core
    to: app/agent-runtime/node_modules/playwright-core
  - from: ../services/agent-runtime/dist/node_modules/chromium-bidi
    to: app/agent-runtime/node_modules/chromium-bidi
  - from: ../services/agent-runtime/dist/node_modules/chromium-bidi/node_modules/zod
    to: app/agent-runtime/node_modules/chromium-bidi/node_modules/zod
  - from: ../services/agent-runtime/dist/node_modules/mitt
    to: app/agent-runtime/node_modules/mitt
  - from: ../services/agent-runtime/dist/node_modules/devtools-protocol
    to: app/agent-runtime/node_modules/devtools-protocol
  - from: ../services/agent-runtime/dist/node_modules/@silvia-odwyer/photon-node
    to: app/agent-runtime/node_modules/@silvia-odwyer/photon-node
  - from: ../services/agent-runtime/dist/node_modules/undici
    to: app/agent-runtime/node_modules/undici
  - from: .next/standalone
    to: app/frontend/.next/standalone
    filter:
      - "**/*"
      - "!**/data/**"
      - "!**/dist-desktop/**"
      - "!**/*.log"
  - from: .next/static
    to: app/frontend/.next/standalone/.next/static
    filter:
      - "**/*"
  - from: .next/static
    to: app/frontend/.next/standalone/frontend/.next/static
    filter:
      - "**/*"
  - from: public
    to: app/frontend/.next/standalone/public
    filter:
      - "**/*"
  - from: public
    to: app/frontend/.next/standalone/frontend/public
    filter:
      - "**/*"
  - from: ../scripts/install-controller.sh
    to: app/scripts/install-controller.sh
  - from: desktop/resources/pi-extensions
    to: desktop/resources/pi-extensions
    filter:
      - "**/*"
  - from: desktop/resources/mcp
    to: desktop/resources/mcp
    filter:
      - "**/*"
  - from: desktop/resources/plugins
    to: desktop/resources/plugins
    filter:
      - "**/*"
  - from: desktop/resources/skills
    to: desktop/resources/skills
    filter:
      - "**/*"

directories:
  output: dist-desktop
  buildResources: desktop/resources

mac:
  icon: desktop/resources/icon.icns
  category: public.app-category.developer-tools
  identity: "sherif cherfa (TZ447KHNZL)"
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: desktop/resources/entitlements.mac.plist
  entitlementsInherit: desktop/resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Record your own voice to create a private, local voice profile.

dmg:
  sign: true

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - AppImage
