name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
      - name: Shared-contract duplication gate
        run: node scripts/validate-shared-contracts.mjs
      - name: Barrel/dir sibling structure gate
        run: node scripts/validate-barrel-dir-siblings.mjs

  controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: ./controller
        run: bun install
      - name: Type check
        working-directory: ./controller
        run: bun run typecheck
      - name: Lint
        working-directory: ./controller
        run: bun run lint
      - name: Cleanup checks
        working-directory: ./controller
        run: bun run check
      - name: Tests
        working-directory: ./controller
        run: bun run test
  agent-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: ./services/agent-runtime
        run: bun install --frozen-lockfile
      - name: Link shared module resolution
        run: ln -sfn services/agent-runtime/node_modules node_modules
      - name: Tests
        working-directory: ./services/agent-runtime
        run: bun run test
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install controller contract dependencies
        working-directory: ./controller
        run: bun install --frozen-lockfile
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps
      - name: Production quality gate
        working-directory: ./frontend
        run: npm run check:quality
