name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
      - name: Shared-contract duplication gate
        run: node scripts/validate-shared-contracts.mjs
      - name: Barrel/dir sibling structure gate
        run: node scripts/validate-barrel-dir-siblings.mjs

  controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: ./controller
        run: bun install
      - name: Type check
        working-directory: ./controller
        run: bun run typecheck
      - name: Lint
        working-directory: ./controller
        run: bun run lint
      - name: Cleanup checks
        working-directory: ./controller
        run: bun run check
      - name: Unit tests
        working-directory: ./controller
        run: bun run test:unit
      - name: Integration tests
        working-directory: ./controller
        run: bun run test:integration

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps
      - name: Production quality gate
        working-directory: ./frontend
        run: npm run check:quality
      - name: Unit tests
        working-directory: ./frontend
        run: npm run test
      - name: Regression tests
        working-directory: ./frontend
        run: npm run test:regression
      - name: Install Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Recorded end-to-end journeys
        working-directory: ./frontend
        run: xvfb-run -a npm run test:e2e:ci
      - name: Upload end-to-end evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-studio-e2e-${{ github.run_id }}
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14
