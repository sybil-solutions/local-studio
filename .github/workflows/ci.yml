name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.19.0
          cache: npm
      - name: Install root dependencies
        run: npm ci --ignore-scripts
      - name: Workflow immutability gate
        run: npm run check:workflow-pins
      - name: Shared-contract duplication gate
        run: node scripts/validate-shared-contracts.mjs
      - name: Barrel/dir sibling structure gate
        run: node scripts/validate-barrel-dir-siblings.mjs

  controller:
    needs: gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.6
      - name: Install dependencies
        working-directory: ./controller
        run: bun install --frozen-lockfile
      - name: Type check
        working-directory: ./controller
        run: bun run typecheck
      - name: Lint
        working-directory: ./controller
        run: bun run lint
      - name: Cleanup checks
        working-directory: ./controller
        run: bun run check
      - name: Tests
        working-directory: ./controller
        run: bun run test
  agent-runtime:
    needs: gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.6
      - name: Install dependencies
        working-directory: ./services/agent-runtime
        run: bun install --frozen-lockfile
      - name: Install shared contract dependencies
        working-directory: ./shared
        run: bun install --frozen-lockfile
      - name: Tests
        working-directory: ./services/agent-runtime
        run: bun run test
  frontend:
    needs: gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.19.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.6
      - name: Install controller contract dependencies
        working-directory: ./controller
        run: bun install --frozen-lockfile
      - name: Install shared contract dependencies
        working-directory: ./shared
        run: bun install --frozen-lockfile
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps
      - name: Production quality gate
        working-directory: ./frontend
        run: npm run check:quality

  desktop-smoke:
    needs: [controller, frontend]
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.19.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.6
      - name: Install controller contract dependencies
        working-directory: ./controller
        run: bun install --frozen-lockfile
      - name: Install dependencies
        run: npm --prefix frontend ci --legacy-peer-deps
      - name: Test packaged desktop smoke harness
        run: npm --prefix frontend run desktop:smoke:test
      - name: Build unpacked desktop app
        env:
          LOCAL_STUDIO_DESKTOP_SMOKE_ARCH: ${{ runner.arch }}
        run: npm --prefix frontend run desktop:pack
      - name: Smoke-test packaged desktop app
        env:
          LOCAL_STUDIO_DESKTOP_SMOKE_ARCH: ${{ runner.arch }}
        run: npm --prefix frontend run desktop:smoke
      - name: Upload bounded failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: desktop-smoke-diagnostics
          path: frontend/dist-desktop/desktop-smoke.log
          if-no-files-found: ignore
          retention-days: 5

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [gates, controller, frontend, agent-runtime, desktop-smoke]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/release.yml
