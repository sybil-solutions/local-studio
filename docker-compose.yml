# Infrastructure services only.
# Controller and frontend run natively on the host (not in Docker)
# because they need nvidia-smi access and host process visibility.

services:
  postgres:
    image: postgres:16
    container_name: vllm-studio-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vllm_studio
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
